name: pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - id: install
        name: Install dependencies
        continue-on-error: true
        run: npm ci

      - id: typecheck
        name: Type check
        continue-on-error: true
        run: npm run type-check

      - id: build
        name: Build
        continue-on-error: true
        run: npm run build

      - name: Update PR auto review comment
        if: always()
        uses: actions/github-script@v7
        env:
          REVIEW_MARKER: "<!-- codex-pr-review -->"
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const marker = process.env.REVIEW_MARKER;
            const icon = (outcome) => {
              if (outcome === "success") return "✅";
              if (outcome === "skipped") return "⚪";
              return "❌";
            };

            const body = `${marker}
            ## 自动审核结果
            ${icon(process.env.INSTALL_OUTCOME)} \`npm ci\`
            ${icon(process.env.TYPECHECK_OUTCOME)} \`npm run type-check\`
            ${icon(process.env.BUILD_OUTCOME)} \`npm run build\`

            这是一条自动审核评论，用来快速判断这次 PR 是否通过基础检查。`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail workflow if review checks did not pass
        if: ${{ steps.install.outcome != 'success' || steps.typecheck.outcome != 'success' || steps.build.outcome != 'success' }}
        run: exit 1
